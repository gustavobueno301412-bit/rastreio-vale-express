<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale Express - Rastreio VIP</title>
    <style>
        :root { --vale-yellow: #FFD700; --vale-black: #1a1a1a; --vale-green: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; padding: 20px 0; }
        .app-card { background: white; width: 95%; max-width: 450px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--vale-black); color: var(--vale-yellow); padding: 20px; text-align: center; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; }
        .perfil { display: flex; align-items: center; padding: 15px 20px; gap: 15px; }
        .avatar-circulo { border: 3px solid var(--vale-yellow); border-radius: 50%; width: 65px; height: 65px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #eee; }
        .avatar-circulo img { width: 100%; height: 100%; object-fit: cover; }
        .grid-selos { display: flex; justify-content: space-around; padding: 15px 10px; background: #fafafa; }
        .selo { text-align: center; opacity: 0.2; filter: grayscale(100%); transition: 0.5s; flex: 1; }
        .selo.ativo { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
        .selo img { width: 45px; height: 45px; border-radius: 50%; background: #fff; padding: 5px; border: 1px solid #eee; }
        .selo span { display: block; font-size: 8px; font-weight: bold; margin-top: 5px; text-transform: uppercase; color: #555; }
        .estrada-box { position: relative; height: 140px; background: #333; margin: 20px; border-radius: 20px; overflow: hidden; border-bottom: 6px solid #111; }
        .faixa { position: absolute; top: 65%; width: 200%; height: 2px; background: linear-gradient(to right, #fff 50%, transparent 50%); background-size: 40px 100%; animation: moveRoad 0.7s linear infinite; animation-play-state: paused; }
        .player-group { position: absolute; bottom: 15px; left: -20%; transition: left 3s ease-in-out; display: flex; flex-direction: column; align-items: center; }
        .foto-flutuante { width: 40px; height: 40px; background: white; border-radius: 50%; border: 2px solid var(--vale-yellow); overflow: hidden; margin-bottom: 5px; }
        .foto-flutuante img { width: 100%; height: 100%; object-fit: cover; }
        .moto-area { position: relative; width: 60px; height: 45px; transform: scaleX(-1); }
        .moto-area img#moto-img { width: 100%; height: 100%; object-fit: contain; }
        .caixa-rastreio { position: absolute; top: -10px; right: -10px; display: none; flex-direction: column; align-items: center; transform: scaleX(-1); }
        .tag-vale { background: #ff8c00; color: white; padding: 2px 4px; font-size: 6px; font-weight: 900; border-radius: 3px; border: 1px solid white; margin-bottom: -5px; z-index: 2; }
        @keyframes moveRoad { from { left: 0; } to { left: -40px; } }
        .balanco { animation: vrum 0.2s infinite; }
        @keyframes vrum { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        #status-msg { text-align: center; font-weight: bold; color: #d32f2f; padding: 10px; text-transform: uppercase; font-size: 0.9rem; min-height: 25px; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">VALE EXPRESS</div>
    <div class="perfil">
        <div class="avatar-circulo"><img src="" id="foto-topo"></div>
        <div class="info"><h3 id="m-nome">...</h3><p id="m-veiculo">...</p></div>
    </div>
    <div class="grid-selos">
        <div class="selo" id="selo1"><img src="https://img.icons8.com/color/96/motorcycle.png"><span>Saindo</span></div>
        <div class="selo" id="selo2"><img src="https://img.icons8.com/color/96/box.png"><span>Coletado</span></div>
        <div class="selo" id="selo3"><img src="https://img.icons8.com/color/96/marker.png"><span>No Local</span></div>
        <div class="selo" id="selo4"><img src="https://img.icons8.com/color/96/checked-checkbox.png"><span>Entregue</span></div>
    </div>
    <div id="status-msg">Localizando entrega...</div>
    <div class="estrada-box">
        <div class="faixa" id="faixa"></div>
        <div class="player-group" id="player-group">
            <div class="foto-flutuante"><img src="" id="foto-mini"></div>
            <div class="moto-area">
                <div id="caixa-container" class="caixa-rastreio"><div class="tag-vale">VALE EXPRESS</div><span>📦</span></div>
                <img src="" id="moto-img">
            </div>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycby-mgqPNTcAwCXjd6v4drrQOtMInZF2xTCN6A52GGlxmeLyaSAbGiNC4RMmCZ8-6fK2_g/exec";
    const motoNome = new URLSearchParams(window.location.search).get('moto');

    async function check() {
        if (!motoNome) return;
        try {
            const [c, a, l] = await Promise.all([
                fetch(URL_API+"?action=getConfig").then(r=>r.json()),
                fetch(URL_API+"?action=getAtivos").then(r=>r.json()),
                fetch(URL_API+"?action=getLocations").then(r=>r.json())
            ]);
           
            const motoInfo = l.find(m => m.nome === motoNome);
            if(motoInfo) {
                document.getElementById('m-nome').innerText = motoInfo.nome;
                document.getElementById('m-veiculo').innerText = motoInfo.detalhes;
                document.getElementById('foto-topo').src = motoInfo.foto;
                document.getElementById('foto-mini').src = motoInfo.foto;
                document.getElementById('moto-img').src = motoInfo.bike;
            }

            const pedido = a.find(p => p.moto === motoNome);
            const p = document.getElementById('player-group');
            const f = document.getElementById('faixa');
            const msg = document.getElementById('status-msg');
            const cx = document.getElementById('caixa-container');

            document.querySelectorAll('.selo').forEach(s => s.classList.remove('ativo'));

            if (!pedido) {
                document.querySelectorAll('.selo').forEach(s => s.classList.add('ativo'));
                msg.innerText = "🏁 ENTREGA REALIZADA! 🥳"; msg.style.color = "#28a745";
                p.style.left = "85%"; f.style.animationPlayState = "paused"; cx.style.display = "none";
            } else {
                const st = pedido.status.toLowerCase();
                f.style.animationPlayState = "running"; p.classList.add('balanco');
                if (st.includes("caminho") || st.includes("pendente")) {
                    document.getElementById('selo1').classList.add('ativo');
                    msg.innerText = "🛵 " + motoNome + " está a caminho!"; p.style.left = "20%"; cx.style.display = "none";
                } else if (st.includes("coletado")) {
                    document.getElementById('selo1').classList.add('ativo');
                    document.getElementById('selo2').classList.add('ativo');
                    msg.innerText = "📦 Pedido coletado! Quase aí..."; p.style.left = "55%"; cx.style.display = "flex";
                }
            }
        } catch (e) {}
    }
    setInterval(check, 8000); check();
</script>
</body>
</html>
