<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛵📦Vale Express - Rastreio</title>
    <style>
        :root { --vale-yellow: #FFD700; --vale-black: #1a1a1a; --vale-green: #28a745; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; padding: 20px 0; }
        .app-card { background: white; width: 95%; max-width: 450px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--vale-black); color: var(--vale-yellow); padding: 20px; text-align: center; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; }
       
        .perfil { display: flex; align-items: center; padding: 15px 20px; gap: 15px; }
        .avatar-circulo { border: 3px solid var(--vale-yellow); border-radius: 50%; width: 65px; height: 65px; object-fit: cover; background: #eee; }
       
        .grid-selos { display: flex; justify-content: space-around; padding: 15px 10px; background: #fafafa; }
        .selo { text-align: center; opacity: 0.2; filter: grayscale(100%); transition: 0.5s; flex: 1; }
        .selo.ativo { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
        .selo img { width: 45px; height: 45px; border-radius: 50%; background: #fff; padding: 5px; border: 1px solid #eee; }
        .selo span { display: block; font-size: 8px; font-weight: bold; margin-top: 5px; text-transform: uppercase; color: #555; }
       
        /* ESTRADA AJUSTADA */
        .estrada-box { position: relative; height: 160px; background: #333; margin: 20px; border-radius: 20px; overflow: hidden; border-bottom: 6px solid #111; }
       
        /* Faixa tracejada no meio para dividir as mãos */
        .faixa-divisoria {
            position: absolute;
            top: 50%;
            width: 200%;
            height: 2px;
            background: linear-gradient(to right, #fff 50%, transparent 50%);
            background-size: 40px 100%;
            animation: moveRoad 0.7s linear infinite;
            animation-play-state: running;
        }

        /* Pistas */
        .pista-contramao { position: absolute; top: 5px; width: 100%; height: 65px; z-index: 5; }
        .carro-extra { position: absolute; right: -100px; z-index: 6; pointer-events: none; }

        .player-group { position: absolute; bottom: 10px; left: 0%; transition: left 2s ease-in-out; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .foto-flutuante { width: 35px; height: 35px; background: white; border-radius: 50%; border: 2px solid var(--vale-yellow); object-fit: cover; margin-bottom: 5px; }
        .moto-area { position: relative; font-size: 45px; transform: scaleX(-1); }
       
        .caixa-rastreio { position: absolute; top: 0; right: -15px; display: none; flex-direction: column; align-items: center; transform: scaleX(-1); }
        .tag-vale { background: #ff8c00; color: white; padding: 2px 5px; font-size: 7px; font-weight: 900; border-radius: 3px; border: 1px solid white; margin-bottom: -5px; z-index: 2; }
        .emoji-pacote { font-size: 25px; }
       
        @keyframes moveRoad { from { left: 0; } to { left: -40px; } }
        .balanco { animation: vrum 0.2s infinite; }
        @keyframes vrum { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
       
        #status-msg { text-align: center; font-weight: bold; color: #d32f2f; padding: 10px; text-transform: uppercase; font-size: 0.9rem; min-height: 40px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">🛵📦 VALE EXPRESS 🛵📦</div>
    <div class="perfil">
        <img id="motorista-foto" class="avatar-circulo" src="https://img.icons8.com/color/96/user.png">
        <div class="info">
            <h3 id="motorista-nome">Buscando entregador...</h3>
            <p id="veiculo-info">Veículo: Carregando...</p>
        </div>
    </div>

    <div class="grid-selos">
        <div class="selo" id="selo1"><img src="https://img.icons8.com/color/96/motorcycle.png"><span>Saindo</span></div>
        <div class="selo" id="selo2"><img src="https://img.icons8.com/color/96/box.png"><span>Coletado</span></div>
        <div class="selo" id="selo3"><img src="https://img.icons8.com/color/96/marker.png"><span>No Local</span></div>
        <div class="selo" id="selo4"><img src="https://img.icons8.com/color/96/checked-checkbox.png"><span>Entregue</span></div>
    </div>

    <div id="status-msg">Aguardando início...</div>

    <div class="estrada-box">
        <div class="pista-contramao" id="pista-contramao"></div>
        <div class="faixa-divisoria" id="faixa"></div>
       
        <div class="player-group" id="player-group">
            <img id="moto-foto-mini" class="foto-flutuante" src="https://img.icons8.com/color/96/user.png">
            <div class="moto-area">
                <div id="caixa-container" class="caixa-rastreio">
                    <div class="tag-vale">VALE EXPRESS</div>
                    <div class="emoji-pacote">📦</div>
                </div>
                <span id="moto-emoji">🛵</span>
            </div>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycby6dT4D742GP3qF8b_oThx7sUsjnMor4j4NTV0TB0h_2CKOpYdH00v59FQaXArRdB9UVw/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const motoNome = urlParams.get('moto');
   
    let statusAtualGlobal = "";
    const emojisExtras = ['🚙','🚴🏻‍♂️','🚗','🛻','🚐','🚚','🚛','🚜','🚒','🚑','🚓','🚕'];

    async function atualizar() {
        if (!motoNome) return;
        try {
            const resLoc = await fetch(URL_API + "?action=getLocations");
            const dadosLoc = await resLoc.json();
            const mInfo = dadosLoc.find(x => x.nome.trim() === motoNome.trim());

            const resAtivos = await fetch(URL_API + "?action=getAtivos");
            const ativos = await resAtivos.json();
            const meuPedido = ativos.find(x => x.moto.trim() === motoNome.trim());

            if (mInfo) {
                document.getElementById('motorista-nome').innerText = mInfo.nome;
                document.getElementById('veiculo-info').innerText = "Veículo: " + (mInfo.detalhes || "Motocicleta");
                if (mInfo.foto) {
                    document.getElementById('motorista-foto').src = mInfo.foto;
                    document.getElementById('moto-foto-mini').src = mInfo.foto;
                }
            }

            statusAtualGlobal = meuPedido ? meuPedido.status.toLowerCase() : "finalizado";
            aplicarAnimacao(statusAtualGlobal);

        } catch (e) { console.log("Erro de conexão."); }
    }

    function aplicarAnimacao(status) {
        const player = document.getElementById('player-group');
        const faixa = document.getElementById('faixa');
        const msg = document.getElementById('status-msg');
        const caixa = document.getElementById('caixa-container');
        const motoEmoji = document.getElementById('moto-emoji');
      
        // Limpa os selos ativos
        document.querySelectorAll('.selo').forEach(s => s.classList.remove('ativo'));
       
        // Configuração padrão de movimento (Saindo e Coletado)
        faixa.style.animationPlayState = "running";
        player.classList.add('balanco');
        caixa.style.display = "none";
        motoEmoji.innerText = "🛵";

        if (status === "saindo") {
            document.getElementById('selo1').classList.add('ativo');
            msg.innerText = "🛵 Motoboy saindo para buscar seu pedido!";
            player.style.left = "15%";
        } else if (status === "coletado") {
            document.getElementById('selo1').classList.add('ativo');
            document.getElementById('selo2').classList.add('ativo');
            msg.innerText = "📦 Pedido coletado! Estamos a caminho.";
            player.style.left = "50%";
            caixa.style.display = "flex";
        } else if (status === "no local") {
            document.getElementById('selo1').classList.add('ativo');
            document.getElementById('selo2').classList.add('ativo');
            document.getElementById('selo3').classList.add('ativo');
            msg.innerText = "📍 O motoboy está no seu endereço!";
            player.style.left = "85%";
            caixa.style.display = "flex";
            // PARAR TUDO: Chegou no destino
            faixa.style.animationPlayState = "paused";
            player.classList.remove('balanco');
        } else if (status === "finalizado") {
            // Ativa todos os selos
            document.querySelectorAll('.selo').forEach(s => s.classList.add('ativo'));
            msg.innerText = "🏁 ENTREGA REALIZADA! 🤝🥳";
            msg.style.color = "#28a745";
           
            // Trava a posição no final (85%) e troca o emoji
            player.style.left = "85%";
            motoEmoji.innerText = "🏁";
           
            // GARANTE QUE PAROU: Remove balanço e pausa a estrada
            player.classList.remove('balanco');
            faixa.style.animationPlayState = "paused";
           
            // Esconde a caixinha pois já entregou
            caixa.style.display = "none";
        }
    }

 

    function gerarTrafego() {
        const pista = document.getElementById('pista-contramao');
        const emoji = emojisExtras[Math.floor(Math.random() * emojisExtras.length)];
        const car = document.createElement('div');
        car.className = 'carro-extra';
        car.innerText = emoji;
       
        const isBike = (emoji === '🚴🏻‍♂️');
        car.style.fontSize = isBike ? '30px' : '52px';

        // LÓGICA DE VELOCIDADE:
        // Moto PARADA quando status é "No Local" ou "Finalizado"
        const motoParada = (statusAtualGlobal === "no local" || statusAtualGlobal === "finalizado");
       
        let duracao = motoParada ? 1200 : 4000; // Carros voam em 1.2s se a moto parar
        if (isBike) duracao = motoParada ? 3000 : 8000; // Bike mais lenta

        pista.appendChild(car);

        car.animate([
            { right: '-100px' },
            { right: '115%' }
        ], {
            duration: duracao,
            easing: 'linear'
        }).onfinish = () => car.remove();

        const proximo = Math.floor(Math.random() * 3000) + 4000;
        setTimeout(gerarTrafego, proximo);
    }

    setInterval(atualizar, 5000);
    atualizar();
    gerarTrafego();
</script>
</body>
</html>
