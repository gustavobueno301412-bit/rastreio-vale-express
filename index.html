<!DOCTYPE html>
<html>
<head>
    <title>Rastreio Vale Express</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-box {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: flex; align-items: center;
        }
        .foto-moto { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; object-fit: cover; border: 2px solid #fbc02d; }
    </style>
</head>
<body>
    <div class="info-box" id="painel">
        <img src="" id="fotoPerfil" class="foto-moto" style="display:none">
        <div>
            <strong id="nomeDisplay">Buscando entregador...</strong><br>
            <span id="detalhesMoto" style="font-size: 12px; color: #666;">Aguardando conexão...</span>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycby-mgqPNTcAwCXjd6v4drrQOtMInZF2xTCN6A52GGlxmeLyaSAbGiNC4RMmCZ8-6fK2_g/exec"; // <--- COLE SUA URL DO GOOGLE AQUI
        const urlParams = new URLSearchParams(window.location.search);
        const motoNome = urlParams.get('moto');

        const map = L.map('map').setView([-22.57, -44.97], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let marker, motinhaIcon;

        async function atualizarRastreio() {
            if (!motoNome) return;
            try {
                const res = await fetch(URL_API + "?action=getLocations");
                const dados = await res.json();
                const m = dados.find(x => x.nome === motoNome);

                if (m) {
                    document.getElementById('nomeDisplay').innerText = m.nome;
                    document.getElementById('detalhesMoto').innerText = m.detalhes || "Em rota de entrega";
                    if (m.foto) {
                        const img = document.getElementById('fotoPerfil');
                        img.src = m.foto; img.style.display = 'block';
                    }

                    const pos = [m.lat, m.lng];
                    if (!marker) {
                        motinhaIcon = L.icon({ iconUrl: m.bike || 'https://cdn-icons-png.flaticon.com/512/713/713311.png', iconSize: [40, 40] });
                        marker = L.marker(pos, {icon: motinhaIcon}).addTo(map);
                    } else {
                        marker.setLatLng(pos);
                    }
                    map.panTo(pos);
                }
            } catch (e) { console.error("Erro ao rastrear", e); }
        }

        setInterval(atualizarRastreio, 5000);
        atualizarRastreio();
    </script>
</body>
</html>
